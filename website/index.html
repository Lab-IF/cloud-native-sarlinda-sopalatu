<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Materi Praktikum Cloud-Native Application Development - Docker, Kubernetes, dan Microservices">
  <meta name="theme-color" content="#2196F3">
  <title>Praktikum Cloud-Native | Unismuh Makassar</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">☁️</span>
          <span class="logo-text">Cloud-Native</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <span></span>
          <span></span>
          <span></span>
        </button>
      </div>
      <nav class="sidebar-nav" id="sidebarNav">
        <!-- Navigation will be rendered by JS -->
      </nav>
      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
          <span class="theme-icon">🌙</span>
          <span class="theme-text">Dark Mode</span>
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
      <!-- Progress Bar -->
      <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <!-- Content sections will be rendered by JS -->
      <div class="content-wrapper" id="contentWrapper">
        <!-- Loading state -->
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>Memuat konten...</p>
        </div>
      </div>
    </main>

    <!-- Mobile overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
